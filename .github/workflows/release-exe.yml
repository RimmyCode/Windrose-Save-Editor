name: Build Release Exe

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version override (e.g. 1.2b) — leave blank to read from package'
        required: false

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            platform: windows
            nuget_src: runtimes/win-x64/native/rocksdb.dll
            lib_dest: rocksdb.dll
          - runner: ubuntu-latest
            platform: linux
            nuget_src: runtimes/linux-x64/native/librocksdb.so
            lib_dest: librocksdb.so

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -e ".[build]"

      - name: Fetch RocksDB native library from NuGet
        shell: bash
        run: |
          pkg_version=$(curl -sL "https://api.nuget.org/v3-flatcontainer/rocksdb/index.json" \
            | python -c "import json,sys; print(json.load(sys.stdin)['versions'][-1])")
          echo "Using RocksDB NuGet version: ${pkg_version}"
          curl -sL "https://api.nuget.org/v3-flatcontainer/rocksdb/${pkg_version}/rocksdb.${pkg_version}.nupkg" -o rocksdb.nupkg
          python -c "
          import zipfile
          with zipfile.ZipFile('rocksdb.nupkg') as zf:
              src = '${{ matrix.nuget_src }}'.lower()
              match = next((m for m in zf.namelist() if m.lower() == src), None)
              if match is None:
                  match = next((m for m in zf.namelist() if src.split('/')[-1] in m.lower()), None)
              if match is None:
                  raise SystemExit(f'Library not found. Available: {[m for m in zf.namelist() if \"native\" in m]}')
              data = zf.read(match)
              open('${{ matrix.lib_dest }}', 'wb').write(data)
              print(f'Fetched ${{ matrix.lib_dest }} ({len(data):,} bytes)')
          "

      - name: Build exe
        run: pyinstaller --clean windrose.spec

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            # Strip leading 'v' from tag name (v1.2b → 1.2b)
            version="${{ github.ref_name }}"
            version="${version#v}"
          elif [[ -n "${{ inputs.version }}" ]]; then
            version="${{ inputs.version }}"
          else
            version=$(python -c "from windrose_save_editor import __version__; print(__version__)")
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Package (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $name = "windrose-save-editor-${{ steps.ver.outputs.version }}-windows.zip"
          Push-Location dist
          7z a -tzip $name "Windrose Save Editor"
          Pop-Location

      - name: Package (Linux)
        if: matrix.platform == 'linux'
        run: |
          name="windrose-save-editor-${{ steps.ver.outputs.version }}-linux.zip"
          (cd dist && zip -r -X "$name" "Windrose Save Editor")

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windrose-save-editor-${{ matrix.platform }}
          path: dist/windrose-save-editor-*.zip
          retention-days: 90

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Resolve version
        id: ver
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            version="${{ github.ref_name }}"
            version="${version#v}"
          elif [[ -n "${{ inputs.version }}" ]]; then
            version="${{ inputs.version }}"
          else
            pip install -e "." -q
            version=$(python -c "from windrose_save_editor import __version__; print(__version__)")
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="${{ steps.ver.outputs.version }}"
          cat > notes.md << NOTES
          ## Downloads

          | Platform | File |
          |----------|------|
          | **Windows** | \`windrose-save-editor-${version}-windows.zip\` — unzip and run \`Windrose Save Editor.exe\` |
          | **Linux** (Proton / native) | \`windrose-save-editor-${version}-linux.zip\` |

          No Python required — just unzip and run.

          ---

          For running from source or contributing, see the [README](https://github.com/RimmyCode/Windrose-Save-Editor#quick-start).
          NOTES

          gh release create "v${version}" \
            --title "Windrose Save Editor ${version}" \
            --notes-file notes.md \
            --latest \
            release-assets/windrose-save-editor-*.zip

      # ── Nexus Mods upload ─────────────────────────────────────────────────
      # To enable:
      #   1. Add NEXUS_API_KEY to repository secrets (Settings → Secrets)
      #   2. Write scripts/nexus_upload.py using the Nexus Mods API
      #   3. Uncomment the step below
      #
      # - name: Upload to Nexus Mods
      #   env:
      #     NEXUS_API_KEY: ${{ secrets.NEXUS_API_KEY }}
      #   run: |
      #     v="${{ steps.ver.outputs.version }}"
      #     python scripts/nexus_upload.py \
      #       --file "release-assets/windrose-save-editor-${v}-windows.zip" \
      #       --version "${v}"
      # ─────────────────────────────────────────────────────────────────────
